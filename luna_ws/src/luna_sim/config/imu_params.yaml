ekf_filter_node:
  ros__parameters:

    publish_tf: true
    use_sim_time: true

    frequency: 30.0
    sensor_timeout: 0.1

    two_d_mode: true

    map_frame: map
    world_frame: odom
    odom_frame: odom
    base_link_frame: base_link

    imu0: /imu/data

    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  false, false, false]

    imu0_differential: false
    imu0_relative: true
    imu0_remove_gravitational_acceleration: true

    odom0: /diff_cont/odom

    odom0_config: [ true,  true,  false,
                    false, false, true,
                    true,  true,  false,
                    false, false, true,
                    false, false, false ]