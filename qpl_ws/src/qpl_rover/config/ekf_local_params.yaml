ekf_local:
  ros__parameters:
    # ------------------------------------------------------------------
    # Core filter settings
    # ------------------------------------------------------------------
    use_sim_time: true
    publish_tf: true
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: false

    # Local EKF:
    # - this filter publishes odom -> base_footprint
    # - a separate global source/filter should publish map -> odom
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # Helpful while bringing the system up
    print_diagnostics: true
    debug: false

    # ------------------------------------------------------------------
    # IMU
    # Fuse yaw and yaw rate.
    # In two_d_mode, roll / pitch / z are constrained by the filter.
    #
    # Config order:
    # [x, y, z,
    #  roll, pitch, yaw,
    #  vx, vy, vz,
    #  vroll, vpitch, vyaw,
    #  ax, ay, az]
    # ------------------------------------------------------------------
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]

    imu0_differential: false
    imu0_relative: false
    imu0_remove_gravitational_acceleration: true

    # ------------------------------------------------------------------
    # Wheel odometry
    # Fuse body-frame velocities from wheel odom.
    # Keep pose disabled here to avoid double-using the same encoder source
    # if the odometry pose is derived from the same internal model.
    # ------------------------------------------------------------------
    odom0: /diff_cont/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]

    odom0_differential: false
    odom0_relative: false

    # ------------------------------------------------------------------
    # Optional visual odometry
    # Leave disabled until frame consistency is confirmed.
    # When enabled, start conservatively.
    # ------------------------------------------------------------------
    odom1: /rtabmap/visual_odom
    odom1_config: [true,  true,  false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom1_differential: false
    odom1_relative: false

    # If VO later fights wheel odom, try twist-only fusion instead:
    # odom1_config: [false, false, false,
    #                false, false, false,
    #                true,  false, false,
    #                false, false, true,
    #                false, false, false]

    # ------------------------------------------------------------------
    # Optional timing settings
    # ------------------------------------------------------------------
    # transform_time_offset: 0.0
    # transform_timeout: 0.0