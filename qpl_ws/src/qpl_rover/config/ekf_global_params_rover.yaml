ekf_global:
  ros__parameters:
    use_sim_time: false
    frequency: 30.0
    sensor_timeout: 0.2
    publish_tf: true
    print_diagnostics: true
    two_d_mode: true
    

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map

    transform_time_offset: 0.0
    transform_timeout: 0.1

    # INPUT 1: The "Smooth" movement from Local EKF
    odom0: /diff_cont/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false

    # INPUT 2: The "Truth" from AprilTags
    pose0: /apriltag/pose
    pose0_config: [true,  true,  false, # Fuse X, Y position
                   false, false, true,  # Fuse Yaw orientation
                   false, false, false,
                   false, false, false,
                   false, false, false]
    pose0_mahalanobis_distance: 3.0  # 3.0 is a standard starting point for strictness

    pose0_differential: false
    pose0_relative: false