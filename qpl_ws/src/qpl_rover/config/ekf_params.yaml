ekf_filter_node:
  ros__parameters:
    # ------------------------------------------------------------------
    # Core filter settings
    # ------------------------------------------------------------------
    use_sim_time: true
    publish_tf: true
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true

    # REP-105 style local EKF:
    # - EKF owns odom -> base_footprint
    # - external global localisation owns map -> odom
    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    # Helpful while bringing the system up
    print_diagnostics: true
    debug: false

    # ------------------------------------------------------------------
    # IMU
    # Fuse yaw and yaw rate.
    # In two_d_mode, Z / roll / pitch states are constrained anyway.
    #
    # Config order:
    # [x, y, z,
    #  roll, pitch, yaw,
    #  vx, vy, vz,
    #  vroll, vpitch, vyaw,
    #  ax, ay, az]
    # ------------------------------------------------------------------
    imu0: /imu/data
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]

    imu0_differential: false
    imu0_relative: false
    # imu0_remove_gravitational_acceleration: true

    # ------------------------------------------------------------------
    # Wheel odometry
    # For a rover, fuse forward velocity and yaw rate.
    # Fuse vy = 0 as a nonholonomic constraint if your odom reports it
    # properly with reasonable covariance.
    #
    # Avoid fusing wheel pose here at first if the same encoder source is
    # already being used to derive the twist data.
    # ------------------------------------------------------------------
    odom0: /diff_cont/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]

    odom0_differential: false
    odom0_relative: false

    # ------------------------------------------------------------------
    # Optional visual odometry
    # Leave disabled for now while debugging frame consistency.
    # If re-enabled later, start conservatively.
    # ------------------------------------------------------------------
    odom1: /rtabmap/visual_odom
    odom1_config: [true,  true,  false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]
    odom1_differential: false
    odom1_relative: false

    # If VO later fights wheel odom, try twist-only fusion instead:
    # odom1_config: [false, false, false,
    #                false, false, false,
    #                true,  false, false,
    #                false, false, true,
    #                false, false, false]

    # ------------------------------------------------------------------
    # Optional timing settings
    # ------------------------------------------------------------------
    # transform_time_offset: 0.0
    # transform_timeout: 0.0