ekf_filter_node:
  ros__parameters:
    publish_tf: true
    use_sim_time: true
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: true

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom   # local fusion only for now

    # Optional but often helpful for debugging startup
    print_diagnostics: true
    debug: false

    # ------------------------------------------------------------------
    # IMU
    # No magnetometer trust for absolute heading, so do NOT fuse yaw pose.
    # Use gyro yaw rate only.
    # In two_d_mode, roll/pitch states are suppressed anyway.
    # ------------------------------------------------------------------
    imu0: /imu/data
    imu0_config: [false, false, false,   # x, y, z
                  false, false, true,   # roll, pitch, yaw
                  false, false, false,   # vx, vy, vz
                  false, false, true,    # vroll, vpitch, vyaw
                  true, true, true]   # ax, ay, az

    imu0_differential: false
    imu0_relative: false
    #imu0_remove_gravitational_acceleration: true

    # ------------------------------------------------------------------
    # Wheel odometry
    # For a rover, fuse forward velocity and yaw rate.
    # Also fuse vy = 0 as a useful nonholonomic constraint.
    # Avoid duplicating wheel-derived pose and twist together at first.
    # ------------------------------------------------------------------
    odom0: /diff_cont/odom
    odom0_config: [false, false, false,  # x, y, z
                   false, false, false,  # roll, pitch, yaw
                   true,  true,  false,  # vx, vy, vz
                   false, false, true,   # vroll, vpitch, vyaw
                   false, false, false]  # ax, ay, az

    odom0_differential: false
    odom0_relative: false

    # ------------------------------------------------------------------
    # Visual odometry (optional, add when rgbd_odometry is ready)
    # Since this is a continuous local source, it belongs in this local EKF.
    # Start by fusing pose in x/y/yaw only, then tune from there.
    # If VO is noisy, switch to twist-only fusion later.
    # ------------------------------------------------------------------
    odom1: /rtabmap/visual_odom
    odom1_config: [true,  true,  false,  # x, y, z
                   false, false, false,   # roll, pitch, yaw
                   true, true, false,  # vx, vy, vz
                   false, false, true,  # vroll, vpitch, vyaw
                   false, false, false]  # ax, ay, az

    odom1_differential: false
    odom1_relative: false

    # # If visual odom starts fighting wheel odom too hard, try this instead:
    # # odom1_config: [false, false, false,
    # #                false, false, false,
    # #                true,  false, false,
    # #                false, false, true,
    # #                false, false, false]

    # # ------------------------------------------------------------------
    # # General filter behavior
    # # ------------------------------------------------------------------
    # transform_time_offset: 0.0
    # transform_timeout: 0.0