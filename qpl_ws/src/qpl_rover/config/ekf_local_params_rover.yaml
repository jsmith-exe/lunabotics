ekf_local:
  ros__parameters:
    # ------------------------------------------------------------------
    # Core filter settings
    # ------------------------------------------------------------------
    use_sim_time: false
    publish_tf: true
    frequency: 50.0
    sensor_timeout: 0.1
    two_d_mode: false

    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: odom

    print_diagnostics: true
    debug: false

    # ------------------------------------------------------------------
    # Wheel odometry
    # ------------------------------------------------------------------
    odom0: /diff_cont/odom
    odom0_config: [false, false, false,
                   false, false, false,
                   true,  true,  false,
                   false, false, true,
                   false, false, false]

    odom0_differential: false
    odom0_relative: false