    global_frame: map
    robot_base_frame: base_footprint
    odom_topic: /odometry/filtered
    bt_loop_duration: 10
    default_server_timeout: 20
    enable_groot_monitoring: false
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_compute_path_through_poses_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_single_trigger_bt_node
      - nav2_is_battery_low_condition_bt_node
      - nav2_navigate_through_poses_action_bt_node
      - nav2_navigate_to_pose_action_bt_node
      - nav2_remove_passed_goals_action_bt_node
      - nav2_planner_selector_bt_node
      - nav2_controller_selector_bt_node
      - nav2_goal_checker_selector_bt_node

controller_server:
  ros__parameters:
    use_sim_time: true
    controller_frequency: 10.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.001
    # Reduce failure tolerance to force a costmap clear quicker when stuck
    failure_tolerance: 0.3 # Default is 0.5. Lower means faster recovery trigger.
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 8.0

    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      stateful: true
      # TOLERANCE NOTE: If robot oscillates at the goal, increase these slightly.
      xy_goal_tolerance: 0.15 # Tightened slightly if precision is needed, match with DWB
      yaw_goal_tolerance: 0.20

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: false

      ### VELOCITY LIMITS (Slowing it down) ##
      max_vel_x: 0.20       # Cut down from 0.4. Max forward speed is now 20 cm/s
      min_vel_x: 0.0        # Allowed to stop if needed

      max_vel_y: 0.0        # Keep at 0.0 since rover is non-holonomic (differential)
      min_vel_y: 0.0

      max_vel_theta: 0.4    # Cut down from 0.8. Slows down how fast it spins in place
      min_speed_xy: 0.0
      max_speed_xy: 0.20    # Match max_vel_x
      min_speed_theta: 0.0

      ### ACCELERATION LIMITS (Smoother movements) ##
      # Lowering these stops the robot from jerking/snapping aggressively
      acc_lim_x: 0.4        # Down from 0.8
      acc_lim_y: 0.0
      acc_lim_theta: 0.8    # Down from 1.5

      decel_lim_x: -0.4     # Down from -0.8
      decel_lim_y: 0.0
      decel_lim_theta: -0.8 # Down from -1.5

      # Trajectory Sampling - Reduce if CPU utilization spikes:
      vx_samples: 10
      vy_samples: 1 # Keep at 1 for differential drive (no strafing)
      vtheta_samples: 12
      sim_time: 1.5 # How many seconds into the future the planner simulates
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 0.5
      xy_goal_tolerance: 0.20
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: true
      stateful: true

      # CRITIC TUNING NOTES:
      # High PathAlign/PathDist = strictly stays on global path.
      # High GoalAlign/GoalDist = rushes toward the goal shortcutting the path.
      # High BaseObstacle = prioritizes safety around obstacles.
      critics:
        - RotateToGoal
        - Oscillation
        - BaseObstacle
        - GoalAlign
        - PathAlign
        - PathDist
        - GoalDist
      BaseObstacle.scale: 25.0
      PathAlign.scale: 5.0
      PathAlign.forward_point_distance: 0.10
      GoalAlign.scale: 5.0
      GoalAlign.forward_point_distance: 0.10
      PathDist.scale: 5.0
      GoalDist.scale: 5.0
      RotateToGoal.scale: 20.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

local_costmap:
  local_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 10.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_footprint
      rolling_window: true
      width: 6
      height: 6
      resolution: 0.05
      robot_radius: 0.70
      transform_tolerance: 0.5
      always_send_full_costmap: true

      ### Costmap mask addition - comment out if need be ###
      filters: ["keepout_filter"]
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"
      ### end of costmap mask addition ###

      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_grid: false
        origin_z: -0.15
        z_resolution: 0.05
        z_voxels: 16
        unknown_threshold: 15
        mark_threshold: 2
        combination_method: 1
        observation_sources: front_camera_raw rear_camera_raw

        front_camera_raw:
          topic: /depth_camera_front/depth/points
          data_type: "PointCloud2"
          clearing: true
          marking: true
          obstacle_max_range: 1.5   # Only remember obstacles up to 1.5m
          raytrace_max_range: 2.0   # Clear out memory up to 2.0m away
          min_obstacle_height: 0.15
          max_obstacle_height: 1.2
          vertical_fov_angle: 1.0

        rear_camera_raw:
          topic: /depth_camera_rear/depth/points
          data_type: "PointCloud2"
          clearing: true
          marking: true
          obstacle_max_range: 1.5
          raytrace_max_range: 2.0
          min_obstacle_height: 0.15
          max_obstacle_height: 1.2
          vertical_fov_angle: 2.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # COST SCALING NOTE:
        # Lower = smoother/wider turns around corners.
        # Higher = tight, aggressive turns (closer to walls).
        cost_scaling_factor: 3.0

        # INFLATION RADIUS NOTE:
        # Must be > robot_radius. Anything inside this radius + robot_radius will receive a high-cost penalization.
        inflation_radius: 0.90

  local_costmap_client:
    ros__parameters:
      use_sim_time: true

  local_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: true

global_costmap:
  global_costmap:
    ros__parameters:
      use_sim_time: true
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_footprint
      rolling_window: true
      width: 16
      height: 16
      resolution: 0.05
      robot_radius: 0.70
      track_unknown_space: true
      transform_tolerance: 0.5
      always_send_full_costmap: true

      ### Costmap mask addition - comment out if need be ###
      filters: [ "keepout_filter" ]
      keepout_filter:
        plugin: "nav2_costmap_2d::KeepoutFilter"
        enabled: true
        filter_info_topic: "/costmap_filter_info"
      ### end of costmap mask addition ###

      plugins: ["obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::VoxelLayer"
        enabled: true
        publish_voxel_grid: false
        origin_z: -0.15
        z_resolution: 0.05
        z_voxels: 16
        unknown_threshold: 15
        mark_threshold: 2
        combination_method: 1
        observation_sources: front_camera_raw rear_camera_raw

        front_camera_raw:
          topic: /depth_camera_front/depth/points
          data_type: "PointCloud2"
          clearing: true
          marking: true
          obstacle_max_range: 1.5
          raytrace_max_range: 2.0
          min_obstacle_height: 0.15
          max_obstacle_height: 1.2
          vertical_fov_angle: 1.0

        rear_camera_raw:
          topic: /depth_camera_rear/depth/points
          data_type: "PointCloud2"
          clearing: true
          marking: true
          obstacle_max_range: 1.5
          raytrace_max_range: 2.0
          min_obstacle_height: 0.15
          max_obstacle_height: 1.2
          vertical_fov_angle: 2.0

      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.90

  global_costmap_client:
    ros__parameters:
      use_sim_time: true

  global_costmap_rclcpp_node:
    ros__parameters:
      use_sim_time: true

planner_server:
  ros__parameters:
    use_sim_time: true
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]

    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.5
      use_astar: true # Speeds up global path calculations dramatically.
      allow_unknown: true # Allows planner to route through unmapped/unknown space

planner_server_rclcpp_node:
  ros__parameters:
    use_sim_time: true

behavior_server:
  ros__parameters:
    use_sim_time: true
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
      spin_dist: 3.14 # Distance to spin in radians (180 degrees to fully clear/sweep camera views)
      time_allowance: 5.0 # Max time allowed to complete execution before timing out
      max_rotational_vel: 0.4 # Target angular speed
    backup:
      plugin: "nav2_behaviors/BackUp"
      backup_dist: 0.30 # Distance to reverse in meters
      time_allowance: 4.0
      speed: 0.10 # Target linear speed (m/s) for backing up
    wait:
      plugin: "nav2_behaviors/Wait"
      time_allowance: 0.5 # Minimal wait; just a brief pause to let the controllers reset
    global_frame: map
    robot_base_frame: base_footprint
    transform_tolerance: 0.5

robot_state_publisher:
  ros__parameters:
    use_sim_time: true

waypoint_follower:
  ros__parameters:
    use_sim_time: true
    loop_rate: 20
    stop_on_failure: false
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: true
      waypoint_pause_duration: 0

velocity_smoother:
  ros__parameters:
    use_sim_time: true
    smoothing_frequency: 10.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    # SMOOTHER NOTE: Limits must be >= DWB Local Planner limits to prevent choking commands
    max_velocity: [0.8, 0.0, 0.8]
    min_velocity: [0.0, 0.0, -0.8]
    max_accel: [1.0, 0.0, 2.0]
    max_decel: [-1.0, 0.0, -2.0]
    odom_topic: /odometry/filtered
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

### Costmap mask addition - comment out if need be ###
costmap_filter_info_server:
  ros__parameters:
    use_sim_time: true
    type: 0
    filter_info_topic: "/costmap_filter_info"
    mask_topic: "/keepout_filter_mask"
    base_frame: "map"
    flip_y: false
### end of costmap mask addition ###

lifecycle_manager_navigation:
  ros__parameters:
    use_sim_time: true
    autostart: true
    node_names:
      - controller_server
      - planner_server
      - behavior_server
      - bt_navigator
      - waypoint_follower
      - velocity_smoother
      - costmap_filter_info_server
