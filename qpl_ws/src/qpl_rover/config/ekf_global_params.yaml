    #                false, false, false,
    #                true,  true,  false,
    #                false, false, true,
    #                false, false, false]

    # odom0_differential: false
    # odom0_relative: false

    pose0: /apriltag/pose
    pose0_config: [true,  true,  false,
                   false, false, true,
                   false, false, false,
                   false, false, false,
                   false, false, false]

    pose0_differential: false
    pose0_relative: false