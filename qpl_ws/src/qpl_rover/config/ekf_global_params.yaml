ekf_global:
  ros__parameters:
    use_sim_time: true
    frequency: 30.0
    sensor_timeout: 0.2
    publish_tf: true
    print_diagnostics: true
    two_d_mode: true
    

    map_frame: map
    odom_frame: odom
    base_link_frame: base_footprint
    world_frame: map

    transform_time_offset: 0.0
    transform_timeout: 0.1

    # odom0: /odometry/local
