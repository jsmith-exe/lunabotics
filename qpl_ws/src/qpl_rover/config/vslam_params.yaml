rtabmap:
  ros__parameters:
    use_sim_time: true

    # ---------------------------------------------------------------------------
    # Frames
    # ---------------------------------------------------------------------------
    frame_id: base_footprint
    odom_frame_id: odom
    map_frame_id: map

    # ---------------------------------------------------------------------------
    # Input sync
    # ---------------------------------------------------------------------------
    approx_sync: true
    approx_sync_max_interval: 0.03   # tighter sync; reduces depth/odom mismatch
    queue_size: 5                    # drop old frames rather than building a backlog

    # ---------------------------------------------------------------------------
    # Odometry — we supply external odometry, don't compute it inside rtabmap
    # ---------------------------------------------------------------------------
    subscribe_odom_info: false
    visual_odometry: false           # ekf_filter_node provides /odometry/filtered

    # ---------------------------------------------------------------------------
    # Depth cloud filtering
    # ---------------------------------------------------------------------------
    cloud_max_depth: 1.0             # metres; reject far depth where the floor stripes are worst
    cloud_min_depth: 0.35            # metres; reject bad near-field returns
    cloud_voxel_size: 0.06           # metres; stronger smoothing before occupancy projection

    # ---------------------------------------------------------------------------
    # Occupancy grid
    # ---------------------------------------------------------------------------
    Grid/MaxObstacleHeight: 1.0      # metres; keep only navigation-relevant obstacles
    Grid/MinClusterSize: 40          # reject sparse fragmented streaks
    Grid/RangeMax: 1.0               # should match cloud_max_depth
    Grid/RangeMin: 0.35              # should match cloud_min_depth
    Grid/FootprintLength: 0.6        # robot footprint for self-filtering
    Grid/FootprintWidth: 0.6
    Grid/FootprintHeight: 0.8

    # ---------------------------------------------------------------------------
    # Loop closure / mapping
    # ---------------------------------------------------------------------------
    Mem/IncrementalMemory: true      # SLAM mode
    Mem/InitWMWithAllNodes: false
    Mem/STMSize: 8                   # reduce CPU load
    RGBD/AngularUpdate: 0.12         # update less often while turning
    RGBD/LinearUpdate: 0.12          # update less often while moving
    RGBD/OptimizeFromGraphEnd: false

    # ---------------------------------------------------------------------------
    # Performance
    # ---------------------------------------------------------------------------
    Rtabmap/ImageDecimation: 2       # halve image resolution before feature extraction
    Rtabmap/DetectionRate: 1.0       # only attempt loop closure once per second

    Vis/MaxFeatures: 400             # enough for indoor/sim SLAM
    Vis/MinInliers: 12               # slightly stricter visual match acceptance

    # ---------------------------------------------------------------------------
    # TF publishing
    # ---------------------------------------------------------------------------
    tf_delay: 0.05                   # publishes TF at ~20 Hz
    tf_tolerance: 0.1                # tolerance on published TF stamp

    # ---------------------------------------------------------------------------
    # Published topics
    # ---------------------------------------------------------------------------
    publish_tf: true                 # publishes map -> odom TF
    gen_scan: false                  # no fake /scan from depth