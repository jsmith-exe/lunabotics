/rtabmap/rtabmap:
  ros__parameters:
    use_sim_time: true

    # -------------------------------------------------------------------------
    # Frames
    # -------------------------------------------------------------------------
    frame_id: base_footprint
    odom_frame_id: odom
    map_frame_id: map

    # -------------------------------------------------------------------------
    # Input mode
    # We now feed RTAB-Map with one pre-synchronised RGBDImages topic
    # that contains both front and rear RGBDImage streams.
    # -------------------------------------------------------------------------
    subscribe_rgb: false
    subscribe_depth: false
    subscribe_rgbd: true
    rgbd_cameras: 0                  # use rgbd_images interface instead of rgbd_image0/rgbd_image1

    # -------------------------------------------------------------------------
    # Input sync
    # -------------------------------------------------------------------------
    approx_sync: true
    approx_sync_max_interval: 0.03
    sync_queue_size: 5

    # -------------------------------------------------------------------------
    # Odometry — we supply external odometry, don't compute it inside rtabmap
    # -------------------------------------------------------------------------
    subscribe_odom_info: false
    visual_odometry: false

    # -------------------------------------------------------------------------
    # Depth cloud filtering
    # -------------------------------------------------------------------------
    cloud_max_depth: 1.25
    cloud_min_depth: 0.05
    cloud_voxel_size: 0.06

    # -------------------------------------------------------------------------
    # Occupancy grid
    # -------------------------------------------------------------------------
    Grid/MaxObstacleHeight: "1.0"
    Grid/MinClusterSize: "40"
    Grid/RangeMax: "1.25"
    Grid/RangeMin: "0.05"
    Grid/FootprintLength: "0.6"
    Grid/FootprintWidth: "0.6"
    Grid/FootprintHeight: "0.8"

    # -------------------------------------------------------------------------
    # Loop closure / mapping
    # -------------------------------------------------------------------------
    Mem/IncrementalMemory: "true"
    Mem/InitWMWithAllNodes: "false"
    Mem/STMSize: "8"
    RGBD/AngularUpdate: "0.12"
    RGBD/LinearUpdate: "0.12"
    RGBD/OptimizeFromGraphEnd: "false"

    # -------------------------------------------------------------------------
    # Performance
    # -------------------------------------------------------------------------
    Rtabmap/ImageDecimation: "2"
    Rtabmap/DetectionRate: "1.0"
    Vis/MaxFeatures: "400"
    Vis/MinInliers: "12"

    # -------------------------------------------------------------------------
    # TF publishing
    # -------------------------------------------------------------------------
    tf_delay: 0.05
    tf_tolerance: 0.1

    # -------------------------------------------------------------------------
    # Published topics
    # -------------------------------------------------------------------------
    publish_tf: true
    gen_scan: false