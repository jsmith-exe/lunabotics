drum_lift_mux:
  ros__parameters:
    use_stamped: false
    cmd_vel_out: cmd_vel_out

    timeout: 0.5

    # linear.z carries the lift command; others zeroed out
    linear:
      x: 0.0
      y: 0.0
      z: 0.1
    angular:
      x: 0.0
      y: 0.0
      z: 0.0

    topics:
      teleop:
        topic: cmd_drum_lift_teleop
        timeout: 0.5
        priority: 100
      nav2:
        topic: cmd_drum_lift_auto
        timeout: 0.5
        priority: 50